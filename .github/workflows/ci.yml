name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Unit tests ────────────────────────────────────────────────────────
      - name: Run unit tests
        run: npm test -- --testPathIgnorePatterns=integration
        env:
          CI: true

      # ── Coverage ──────────────────────────────────────────────────────────
      - name: Run tests with coverage
        run: npm run test:coverage -- --testPathIgnorePatterns=integration
        env:
          CI: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Print coverage summary
        run: |
          echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('./coverage/coverage-summary.json', 'utf8'));
            const t = data.total;
            console.log('Statements : ' + t.statements.pct + '% (' + t.statements.covered + '/' + t.statements.total + ')');
            console.log('Branches   : ' + t.branches.pct   + '% (' + t.branches.covered   + '/' + t.branches.total   + ')');
            console.log('Functions  : ' + t.functions.pct  + '% (' + t.functions.covered  + '/' + t.functions.total  + ')');
            console.log('Lines      : ' + t.lines.pct      + '% (' + t.lines.covered      + '/' + t.lines.total      + ')');
          " 2>/dev/null || echo "(coverage-summary.json not found)"
          echo '```' >> $GITHUB_STEP_SUMMARY

      # ── E2E tests ─────────────────────────────────────────────────────────
      # cypress-io/github-action handles starting the dev server and waiting
      # for it internally — no need for a separate wait-on step
      - name: Run Cypress E2E
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          headed: false
          start: npm run dev
          wait-on: 'http://localhost:5173'
          wait-on-timeout: 60
        env:
          VITE_ANTHROPIC_API_KEY: ${{ secrets.VITE_ANTHROPIC_API_KEY }}

      - name: Upload Cypress screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
          retention-days: 7
